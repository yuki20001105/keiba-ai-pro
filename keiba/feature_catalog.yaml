version: '1.0'
future_fields:
- time_seconds
- finish_time
- last_3f
- last_3f_time
- last_3f_rank
- last_3f_rank_normalized
- corner_1
- corner_2
- corner_3
- corner_4
- corner_positions
- corner_positions_list
- corner_position_avg
- corner_position_variance
- last_corner_position
- position_change
- margin
- prize_money
- finish
- finish_position
- actual_finish
scraped_fields:
  race:
  - name: race_id
    description: 'レースID (YYYYMMDDVVRR形式: 年4桁+場所2桁+開催回2桁+日目2桁+レース番号2桁)'
  - name: race_date
    description: レース開催日 (YYYYMMDD形式)
  - name: race_name
    description: 'レース名 (例: 東京大賞典、有馬記念)'
  - name: venue
    description: '競馬場名 (例: 東京, 中山, 阪神, 京都)'
  - name: distance
    description: 'レース距離 (m単位, 例: 1600, 2000, 2400)'
  - name: surface
    description: 馬場種別 (芝/ダート)
  - name: race_class
    description: 'レースクラス文字列 (例: 新馬, 未勝利, 1勝クラス, OP)'
  - name: going
    description: 馬場状態文字列 (良/稍重/重/不良, field_conditionの別名)
  - name: weather
    description: 天候 (晴/曇/雨/小雨/雪)
  - name: num_horses
    description: 出走頭数
  - name: lap_cumulative
    description: '累積ラップタイム (JSONリスト: 200m地点からの通過タイム)'
  - name: lap_sectional
    description: '区間ラップタイム (JSONリスト: 200m区間ごとの所要タイム)'
  - name: tansho_payout
    description: 単勝配当金 (円)
  - name: fukusho_min_payout
    description: 複勝最小配当金 (円, 1着馬の複勝)
  - name: fukusho_max_payout
    description: 複勝最大配当金 (円, 3着馬の複勝)
  - name: sanrentan_payout
    description: 三連単配当金 (円)
  - name: post_time
    description: 発走時刻 (HH:MM形式)
  - name: kai
    description: '開催回数 (race_idの3-4桁目: 例 01=第1回開催)'
  - name: day
    description: '開催日目 (race_idの5-6桁目: 例 01=第1日目, 08=第8日目)'
  - name: field_condition
    description: '馬場状態 (going別名: 良/稍重/重/不良, LabelEncodeでfield_condition_encodedに変換)'
  horse:
  - name: horse_id
    description: 馬固有ID
  - name: horse_name
    description: 馬名
  - name: horse_number
    description: 馬番 (ゲート番号, 1〜18)
  - name: bracket
    description: 枠番 (1〜8)
  - name: age
    description: 馬齢 (年, 2歳〜)
  - name: sex
    description: 性別 (牡/牝/セ)
  - name: jockey_id
    description: 騎手固有ID
  - name: jockey_name
    description: 騎手名
  - name: trainer_id
    description: 調教師固有ID
  - name: trainer_name
    description: 調教師名
  - name: owner_id
    description: 馬主固有ID
  - name: owner_name
    description: 馬主名
  - name: horse_weight
    description: 馬体重 (kg, レース当日計測値)
  - name: horse_weight_change
    description: 馬体重変化 (kg, 前走比)
  - name: weight_kg
    description: 馬体重kg (horse_weightの別名・重複列)
  - name: weight_change
    description: 馬体重変化 (horse_weight_changeの別名・重複列)
  - name: burden_weight
    description: 斤量 (kg, 騎手+装備の負担重量)
  - name: odds
    description: 単勝オッズ (発走直前確定値)
  - name: popularity
    description: '人気順位 (オッズ順: 1=1番人気)'
  - name: sire
    description: 父馬名
  - name: damsire
    description: 母父馬名
  - name: prev_race_date
    description: 前走日 (YYYYMMDD)
  - name: prev_race_distance
    description: 前走距離 (m)
  - name: prev_race_finish
    description: 前走着順
  - name: prev_race_time
    description: 前走タイム (秒)
  - name: prev2_race_date
    description: 2走前日付 (YYYYMMDD)
  - name: prev2_race_distance
    description: 2走前距離 (m)
  - name: prev2_race_finish
    description: 2走前着順
  - name: prev2_race_time
    description: 2走前タイム (秒)
  - name: prev2_race_weight
    description: 2走前馬体重 (kg)
  - name: prev_race_weight
    description: 前走馬体重 (kg)
  - name: horse_total_wins
    description: '通算勝利数 (プロフィール現在値: 再スクレイプ時に未来情報混入リスク)'
  - name: horse_total_runs
    description: '通算出走数 (プロフィール現在値: 再スクレイプ時に未来情報混入リスク)'
  - name: horse_total_prize_money
    description: '通算獲得賞金 (プロフィール現在値: 再スクレイプ時に未来情報混入リスク)'
  - name: finish
    description: 着順 (レース結果・未来情報)
  - name: time_seconds
    description: 走破タイム秒 (レース結果・未来情報)
  - name: last_3f_time
    description: 上がり3F秒 (レース結果・未来情報)
  - name: corner_positions
    description: コーナー通過順位文字列 (レース結果・未来情報)
  - name: margin
    description: 着差 (レース結果・未来情報)
  - name: prize_money
    description: 賞金 (レース結果・未来情報)
engineered_features:
- name: days_since_last_race
  stage: days_from_history
  type: numeric
  enabled: true
  description: 前走からの経過日数（DB全履歴から正確に計算）
- name: running_style
  stage: horse_category
  type: categorical
  enabled: true
  description: 脚質分類 (逃げ/先行/差し/追込)
- name: running_style_num
  stage: horse_category
  type: numeric
  enabled: true
  description: 脚質数値エンコード
- name: rest_short
  stage: horse_category
  type: binary
  enabled: true
  description: 短期休み (14日以内)
- name: rest_normal
  stage: horse_category
  type: binary
  enabled: true
  description: 標準休み (15-30日)
- name: rest_long
  stage: horse_category
  type: binary
  enabled: true
  description: 長期休み (31-60日)
- name: rest_very_long
  stage: horse_category
  type: binary
  enabled: true
  description: 超長期休み (61日以上)
- name: sex_牡
  stage: horse_category
  type: binary
  enabled: false
  description: '性別ダミー: 牡（廃止: sex_encodedに統合）'
- name: sex_牝
  stage: horse_category
  type: binary
  enabled: false
  description: '性別ダミー: 牝（廃止: sex_encodedに統合）'
- name: sex_セ
  stage: horse_category
  type: binary
  enabled: false
  description: '性別ダミー: セン馬（廃止: sex_encodedに統合）'
- name: rest_category
