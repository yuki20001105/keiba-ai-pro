  stage: id_season
  type: numeric
  enabled: true
  description: 日付のcos変換 (季節性)
- name: sin_date
  stage: id_season
  type: numeric
  enabled: true
  description: 日付のsin変換 (季節性)
- name: season
  stage: id_season
  type: numeric
  enabled: true
