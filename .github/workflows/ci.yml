name: CI

on:
  pull_request:
    branches:
      - develop
      - main
      - release
  push:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-static-and-unit:
    name: Frontend L1 (lint/typecheck/vitest/build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

      - name: Vitest supabase-ssr-cookie-contract
        run: npx vitest run src/__tests__/supabase-ssr-cookie-contract.test.ts

      - name: Build
        run: npm run build

  dependency-security-release-blocking:
    name: Dependency security (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependency graph without lifecycle scripts
        run: npm ci --ignore-scripts --omit=optional --no-fund

      - name: Verify installed mandatory dependency tree
        run: npm ls --all --omit=optional

      - name: Generate full dependency audit report
        continue-on-error: true
        run: |
          mkdir -p reports
          npm audit --audit-level=high --json > reports/npm-audit-full.json

      - name: Generate production dependency audit report
        continue-on-error: true
        run: |
          mkdir -p reports
          npm audit --omit=dev --audit-level=high --json > reports/npm-audit-production.json

      - name: Enforce Node 24 and zero critical/high vulnerabilities
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          if (process.versions.node.split('.')[0] !== '24') {
            throw new Error(`Expected Node 24, got ${process.version}`)
          }

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          if (packageJson.engines?.node !== '24.x') {
            throw new Error('package.json must pin engines.node to 24.x')
          }

          for (const reportPath of [
            'reports/npm-audit-full.json',
            'reports/npm-audit-production.json',
          ]) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'))
            const counts = report?.metadata?.vulnerabilities
            if (!counts || !Number.isInteger(counts.critical) || !Number.isInteger(counts.high)) {
              throw new Error(`${reportPath} is missing vulnerability counters`)
            }
            if (counts.critical !== 0 || counts.high !== 0) {
              throw new Error(
                `${reportPath} contains critical=${counts.critical}, high=${counts.high}`,
              )
            }
          }
          NODE

      - name: Upload dependency security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports
          path: |
            reports/npm-audit-full.json
            reports/npm-audit-production.json
          if-no-files-found: error

  python-static-and-tests:
    name: Python L1/L2 (compile/import/pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Python compile check
        run: python -m compileall -q python-api scripts

      - name: FastAPI import check
        run: python -c "import sys; sys.path.insert(0, 'python-api'); import main; print('FastAPI import OK')"

      - name: Pytest (feature consistency included)
        run: |
          python -m pytest \
            keiba/keiba_ai/tests/test_feature_engineering.py \
            keiba/keiba_ai/tests/test_train_inference_consistency.py::TestConsistencyWithSyntheticData \
            python-api/tests/test_contract_health.py \
            -v --tb=short

      - name: Pytest Phase2 authz
        run: python -m pytest python-api/tests/test_phase2_authz.py -q

      - name: Pytest Phase2 static contracts
        run: python -m pytest python-api/tests/test_phase2_static_contracts.py -q

      - name: Pytest Phase2 authz matrix gate
        run: python -m pytest python-api/tests/test_phase2_authz_matrix_gate.py -q

      - name: Generate Phase2 authz matrix check
        run: python scripts/security/generate_phase2_authz_matrix.py --check

      - name: Phase3D live validation safety (release-blocking)
        run: python -m pytest python-api/tests/test_live_validation.py python-api/tests/test_p0_live_validator_safety.py -q

      - name: Phase3E scrape job ownership and persistence (release-blocking)
        run: python -m pytest python-api/tests/test_phase3e_scrape_job_security.py -q

      - name: Phase3F authoritative review ledger contract (release-blocking)
        run: python -m pytest python-api/tests/test_phase3f_approval_ledger_static_contract.py -q

      - name: Phase3G runtime evidence verifier and harness contracts (release-blocking)
        run: python -m pytest python-api/tests/test_phase3g_runtime_evidence_gate.py python-api/tests/test_phase3g_review_ledger_runtime_harness.py -q

      - name: Phase3H production readiness decision contract (release-blocking)
        run: python -m pytest python-api/tests/test_phase3h_production_readiness_gate.py -q

      - name: Phase3I synthetic saga failure-injection contracts (release-blocking)
        run: >-
          python -m pytest
          python-api/tests/test_phase3i_cross_store_saga_contract.py
          python-api/tests/test_phase3i_saga_failure_injection_harness.py
          python-api/tests/test_phase3i_saga_failure_injection_gate.py
          -q

      - name: Phase3J disposable saga/outbox runtime contracts (release-blocking)
        run: >-
          python -m pytest
          python-api/tests/test_phase3j_reservation_migration_contract.py
          python-api/tests/test_phase3j_saga_config.py
          python-api/tests/test_phase3j_saga_store.py
          python-api/tests/test_phase3j_saga_runtime.py
          python-api/tests/test_phase3j_saga_outbox_runtime_harness.py
          python-api/tests/test_phase3j_saga_outbox_runtime_gate.py
          -q

      - name: Phase3L deployment workflow safety (release-blocking)
        run: python -m pytest python-api/tests/test_phase3l_deployment_safety.py -q

  contract-smoke-aux:
    name: Contract smoke aux (warn-allowed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Run payload contract diff smoke
        run: python scripts/compare_netkeiba_race_payload_contract.py

      - name: Upload smoke JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-smoke-aux-json
          path: reports/netkeiba_race_payload_contract_diff.json
          if-no-files-found: ignore

  contract-gate-deterministic:
    name: Contract gate deterministic (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Validate compare-script matrix and gate policy
        run: python -m pytest python-api/tests/test_payload_contract_gate.py -v --tb=short

      - name: Run deterministic contract gate fixture
        run: |
          python scripts/compare_netkeiba_race_payload_contract.py --dry-run-report python-api/tests/fixtures/contract_dry_run_compatible.json --skip-staleness-check
          python -c "import json,sys; d=json.load(open('reports/netkeiba_race_payload_contract_diff.json',encoding='utf-8')); ok=bool(d.get('success')) and d.get('verdict')=='pass'; print({'verdict':d.get('verdict'),'reason':d.get('verdict_reason')}); sys.exit(0 if ok else 1)"

      - name: Upload contract-gate JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-gate-json
          path: reports/netkeiba_race_payload_contract_diff.json
          if-no-files-found: ignore

  e2e-public-and-fixture-smoke:
    name: Playwright public + fixture smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
      PW_USE_WEBSERVER: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run release-blocking Playwright E2E suite
        run: npx playwright test e2e/public-fixture-smoke.spec.ts e2e/phase2-authz.spec.ts e2e/data-collection-phase3b.spec.ts e2e/data-collection-phase3c.spec.ts e2e/data-collection-phase3d.spec.ts e2e/data-collection-phase3e.spec.ts e2e/data-collection-phase3f.spec.ts e2e/data-collection-phase3g.spec.ts --trace=retain-on-failure --retries=0 --workers=1

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-public-fixture-smoke
          path: |
            test-results
            e2e-report
          if-no-files-found: ignore

  security-scanners-release-blocking:
    name: Security scanners (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/develop ref is available
        run: git fetch --no-tags origin develop:refs/remotes/origin/develop

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install "pytest>=9,<10"

      - name: Secret scanner (release-blocking)
        run: python scripts/security/scan_new_secrets.py

      - name: Test weakening scanner (release-blocking)
        run: python scripts/security/scan_test_weakening.py

      - name: Scanner regression tests
        run: python -m pytest python-api/tests/test_security_scanners_regression.py -q

      - name: Upload scanner reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scanner-reports
          path: |
            reports/security_secret_scan.json
            reports/test_weakening_scan.json
          if-no-files-found: ignore

  phase3g-review-ledger-runtime:
    name: Phase3G review ledger runtime (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run disposable network-isolated PostgreSQL contract
        run: python scripts/security/run_phase3g_review_ledger_runtime_gate.py

      - name: Verify sanitized synthetic runtime evidence
        run: python scripts/verify_phase3g_runtime_evidence.py --evidence reports/phase3g_review_ledger_runtime.json --expected-commit "$GITHUB_SHA" --max-age-seconds 900

      - name: Upload Phase3G runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3g-review-ledger-runtime-json
          path: |
            reports/phase3g_review_ledger_runtime.json
            reports/phase3g_runtime_evidence_gate.json
          if-no-files-found: error

  phase3h-production-readiness:
    name: Phase3H production readiness decision (release-blocking)
    needs: phase3g-review-ledger-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Phase3G runtime evidence from this workflow run
        uses: actions/download-artifact@v4
        with:
          name: phase3g-review-ledger-runtime-json
          path: reports/phase3g-input

      - name: Derive fail-closed production readiness decision
        run: >-
          python scripts/verify_phase3h_production_readiness.py
          --manifest python-api/tests/fixtures/phase3h_production_readiness_current_not_ready.json
          --phase3g-evidence reports/phase3g-input/phase3g_review_ledger_runtime.json
          --expected-commit "$GITHUB_SHA"
          --max-age-seconds 3600

      - name: Block NOT_READY promotion to main or release
        if: >-
          (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'release')) ||
          (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'release')) ||
          (github.event_name == 'workflow_dispatch' && (github.ref_name == 'main' || github.ref_name == 'release'))
        run: >-
          python scripts/verify_phase3h_production_readiness.py
          --manifest python-api/tests/fixtures/phase3h_production_readiness_current_not_ready.json
          --phase3g-evidence reports/phase3g-input/phase3g_review_ledger_runtime.json
          --expected-commit "$GITHUB_SHA"
          --max-age-seconds 3600
          --require-ready

      - name: Upload Phase3H production readiness decision
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3h-production-readiness-json
          path: reports/phase3h_production_readiness_gate.json
          if-no-files-found: error

  phase3i-saga-failure-injection:
    name: Phase3I synthetic saga failure injection (release-blocking)
    needs: phase3h-production-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download same-run Phase3H decision evidence
        uses: actions/download-artifact@v4
        with:
          name: phase3h-production-readiness-json
          path: reports/phase3h-input

      - name: Run synthetic saga failure-injection matrix
        run: >-
          python scripts/security/run_phase3i_saga_failure_injection_gate.py
          --contract python-api/tests/fixtures/phase3i_saga_failure_matrix_v1.json
          --expected-commit "$GITHUB_SHA"

      - name: Verify synthetic saga evidence and Phase3H boundary
        run: >-
          python scripts/verify_phase3i_saga_failure_injection.py
          --evidence reports/phase3i_saga_failure_injection_runtime.json
          --contract python-api/tests/fixtures/phase3i_saga_failure_matrix_v1.json
          --phase3h-evidence reports/phase3h-input/phase3h_production_readiness_gate.json
          --expected-commit "$GITHUB_SHA"
          --max-age-seconds 3600

      - name: Upload Phase3I synthetic saga evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3i-saga-failure-injection-json
          path: |
            reports/phase3i_saga_failure_injection_runtime.json
            reports/phase3i_saga_failure_injection_gate.json
          if-no-files-found: error

  phase3j-saga-outbox-runtime:
    name: Phase3J disposable saga/outbox runtime (release-blocking)
    needs:
      - phase3h-production-readiness
      - phase3i-saga-failure-injection
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download same-run Phase3H decision evidence
        uses: actions/download-artifact@v4
        with:
          name: phase3h-production-readiness-json
          path: reports/phase3h-input

      - name: Download same-run Phase3I saga evidence
        uses: actions/download-artifact@v4
        with:
          name: phase3i-saga-failure-injection-json
          path: reports/phase3i-input

      - name: Run disposable SQLite and network-isolated PostgreSQL saga/outbox matrix
        run: >-
          python scripts/security/run_phase3j_saga_outbox_runtime_gate.py
          --contract python-api/tests/fixtures/phase3j_saga_outbox_failure_matrix_v1.json
          --migration supabase/migrations/20260720_scrape_execution_reservation.sql
          --runtime-dir python-api/scraping
          --expected-commit "$GITHUB_SHA"

      - name: Verify Phase3J runtime and same-run Phase3H/Phase3I boundaries
        if: always()
        run: >-
          python scripts/verify_phase3j_saga_outbox_runtime.py
          --evidence reports/phase3j_saga_outbox_runtime.json
          --contract python-api/tests/fixtures/phase3j_saga_outbox_failure_matrix_v1.json
          --migration supabase/migrations/20260720_scrape_execution_reservation.sql
          --store python-api/scraping/cross_store_saga_store.py
          --runtime-dir python-api/scraping
          --phase3h-evidence reports/phase3h-input/phase3h_production_readiness_gate.json
          --phase3i-evidence reports/phase3i-input/phase3i_saga_failure_injection_gate.json
          --expected-commit "$GITHUB_SHA"
          --max-age-seconds 3600

      - name: Upload Phase3J disposable saga/outbox evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3j-saga-outbox-runtime-json
          path: |
            reports/phase3j_saga_outbox_runtime.json
            reports/phase3j_saga_outbox_runtime_gate.json
          if-no-files-found: error

  container-build-check:
    name: Container build check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build FastAPI image
        run: docker build -f Dockerfile -t keiba-ai-pro-fastapi:ci .

      - name: Build Next.js image
        run: docker build -f Dockerfile.nextjs -t keiba-ai-pro-nextjs:ci .
