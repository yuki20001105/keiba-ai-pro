name: CI

on:
  pull_request:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-static-and-unit:
    name: Frontend L1 (lint/typecheck/vitest/build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

  python-static-and-tests:
    name: Python L1/L2 (compile/import/pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Python compile check
        run: python -m compileall -q python-api scripts

      - name: FastAPI import check
        run: python -c "import sys; sys.path.insert(0, 'python-api'); import main; print('FastAPI import OK')"

      - name: Pytest (feature consistency included)
        run: |
          python -m pytest \
            keiba/keiba_ai/tests/test_feature_engineering.py \
            keiba/keiba_ai/tests/test_train_inference_consistency.py::TestConsistencyWithSyntheticData \
            python-api/tests/test_contract_health.py \
            -v --tb=short

  contract-smoke-aux:
    name: Contract smoke aux (warn-allowed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Run payload contract diff smoke
        run: python scripts/compare_netkeiba_race_payload_contract.py

      - name: Upload smoke JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-smoke-aux-json
          path: reports/netkeiba_race_payload_contract_diff.json
          if-no-files-found: ignore

  contract-gate-deterministic:
    name: Contract gate deterministic (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUTF8: '1'
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r python-api/requirements.txt
          pip install "pytest>=9,<10"

      - name: Validate compare-script matrix and gate policy
        run: python -m pytest python-api/tests/test_payload_contract_gate.py -v --tb=short

      - name: Run deterministic contract gate fixture
        run: |
          python scripts/compare_netkeiba_race_payload_contract.py --dry-run-report python-api/tests/fixtures/contract_dry_run_compatible.json --stale-seconds 86400
          python -c "import json,sys; d=json.load(open('reports/netkeiba_race_payload_contract_diff.json',encoding='utf-8')); ok=bool(d.get('success')) and d.get('verdict')=='pass'; print({'verdict':d.get('verdict'),'reason':d.get('verdict_reason')}); sys.exit(0 if ok else 1)"

      - name: Upload contract-gate JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-gate-json
          path: reports/netkeiba_race_payload_contract_diff.json
          if-no-files-found: ignore

  e2e-public-and-fixture-smoke:
    name: Playwright public + fixture smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_KEY: ci-dummy-service-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NETKEIBA_RACE_WRITE_ENABLED: "false"
      ALLOW_STAGING_WRITE: "false"
      SCHEDULER_ENABLED: "false"
      PW_USE_WEBSERVER: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run public/fixture smoke E2E
        run: npx playwright test e2e/public-fixture-smoke.spec.ts --trace=on --reporter=html,list

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-public-fixture-smoke
          path: |
            test-results
            e2e-report
          if-no-files-found: ignore

  container-build-check:
    name: Container build check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build FastAPI image
        run: docker build -f Dockerfile -t keiba-ai-pro-fastapi:ci .

      - name: Build Next.js image
        run: docker build -f Dockerfile.nextjs -t keiba-ai-pro-nextjs:ci .
