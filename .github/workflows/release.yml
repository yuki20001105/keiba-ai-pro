name: Release Safety Gate

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

permissions:
  contents: read

# This repository does not yet have trusted L3 staging evidence or an approved
# production-readiness attestation. A release event must therefore fail closed;
# this workflow deliberately performs no deployment and creates no GitHub Release.
jobs:
  production-release-blocked:
    name: Production release blocked (READY/L3 evidence required)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse release without trusted READY/L3 evidence
        shell: bash
        run: |
          echo "::error::Production release is blocked until trusted READY and L3 evidence is verified in the same release run."
          exit 1
