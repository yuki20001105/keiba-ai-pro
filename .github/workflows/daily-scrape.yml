name: Daily Scrape

on:
  schedule:
    # 毎日 JST 7:00 = UTC 22:00（前日）に実行
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "取得する日数（デフォルト: 3）"
        required: false
        default: "3"

# ────────────────────────────────────────────────────────────────
# 設計方針: FastAPI サーバーを経由しない（ゼロ課金・高安全）
#   - GitHub Actions が python-api/run_scrape.py を直接実行
#   - INTERNAL_SECRET / API_URL 不要 → 公開エンドポイントなし
#   - Supabase へは service_role キーで直接書き込み（RLS バイパス）
#
# 必要な GitHub Secrets / Variables:
#   secrets.SUPABASE_SERVICE_KEY  service_role キー（Supabase > Settings > API）
#   vars.SUPABASE_URL             例: https://xxxx.supabase.co（非機密）
# ────────────────────────────────────────────────────────────────

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: python-api

      - name: Run scrape
        working-directory: python-api
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DAYS_BACK=${{ github.event.inputs.days_back || '3' }}
          echo "days_back: $DAYS_BACK"
          python run_scrape.py --days-back "${DAYS_BACK}"
