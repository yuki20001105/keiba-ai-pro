name: Daily Scrape (disabled pending saga-backed scheduler)

on:
  workflow_dispatch:

permissions:
  contents: read

# The legacy direct scraper bypassed the Phase3J saga/outbox boundary. Keep this
# workflow as an explicit fail-closed tombstone until a scheduler using the
# durable saga entry point is reviewed and enabled.
jobs:
  unsafe-production-write-blocked:
    name: Unsafe production scrape is blocked
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse saga-external production write
        shell: bash
        run: |
          echo "::error::Daily scrape is disabled: production writes must use the reviewed saga/outbox path."
          exit 1
