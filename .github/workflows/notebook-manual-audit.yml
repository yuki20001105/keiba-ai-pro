name: notebook-manual-audit

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Notebook start index"
        required: true
        default: "0"
      end:
        description: "Notebook end index"
        required: true
        default: "8"
      mode:
        description: "Execution mode"
        required: true
        default: "audit"
        type: choice
        options:
          - fast
          - audit
          - prod
      retry:
        description: "Retry count"
        required: true
        default: "3"

jobs:
  audit-manual:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run notebook audit tests
        run: pytest tests/notebook -q

      - name: Run notebook audit (manual)
        run: |
          python scripts/notebook_audit_runner.py \
            --start ${{ github.event.inputs.start }} \
            --end ${{ github.event.inputs.end }} \
            --mode ${{ github.event.inputs.mode }} \
            --max-retry ${{ github.event.inputs.retry }} \
            --cell-timeout 600 \
            --notebook-timeout 7200 \
            --rerun-failed 1

      - name: Validate artifacts
        run: python scripts/validate_artifacts.py

      - name: Build gpu benchmark report
        run: python scripts/collect_gpu_benchmark.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: notebook-manual-audit-reports
          path: reports/
