name: notebook-pr-audit

on:
  pull_request:
    branches: [main, develop]

jobs:
  audit-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run notebook audit tests
        run: pytest tests/notebook -q

      - name: Run notebook audit (FAST)
        run: |
          python scripts/notebook_audit_runner.py \
            --start 0 \
            --end 8 \
            --mode fast \
            --max-retry 3 \
            --cell-timeout 600 \
            --notebook-timeout 7200 \
            --rerun-failed 1

      - name: Validate artifacts
        run: python scripts/validate_artifacts.py

      - name: Build gpu benchmark report
        run: python scripts/collect_gpu_benchmark.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: notebook-pr-audit-reports
          path: reports/
