services:
  - type: web
    name: keiba-ai-api
    runtime: python
    rootDir: python-api
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/keiba uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ALLOWED_ORIGINS
        value: https://keiba-ai-pro.vercel.app,http://localhost:3000
      - key: SUPABASE_URL
        value: https://grfwkutcsavqicaimssn.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
        # ↑ Supabase > Settings > API > service_role キー（RLS バイパス用）
      - key: PYTHONUNBUFFERED
        # NOTE: SUPABASE_JWT_SECRET は削除済み（JWKS 公開鍵検証に移行）
        # NOTE: INTERNAL_SECRET は削除済み（GitHub Actions が直接 Supabase 書き込みに移行）
        value: "1"
