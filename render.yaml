services:
  - type: web
    name: keiba-ai-api
    runtime: python
    rootDir: python-api
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/keiba uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: APP_ENV
        value: production
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: SUPABASE_DATA_ENABLED
        value: "false"
      - key: NETKEIBA_RACE_WRITE_ENABLED
        value: "false"
      - key: ALLOW_STAGING_WRITE
        value: "false"
      - key: PRED_LIMIT_ALLOW_FAIL_OPEN
        value: "false"
      - key: PHASE3J_SAGA_RUNTIME_MODE
        value: disabled
      - key: PHASE3J_REMOTE_EFFECTS_ENABLED
        value: "false"
      - key: PHASE3J_WORKER_DISPATCH_ENABLED
        value: "false"
      - key: PHASE3J_EXECUTION_UNLOCK_ENABLED
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://keiba-ai-pro.vercel.app
      - key: SUPABASE_URL
        value: https://grfwkutcsavqicaimssn.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
