<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SVG to PNG Converter</title>
</head>
<body>
    <h2>KEIBA AI PRO - Icon Generator</h2>
    <p>SVGからPNGへの変換ツール</p>
    
    <canvas id="canvas192" width="192" height="192" style="border:1px solid #ccc; margin:10px;"></canvas>
    <canvas id="canvas512" width="512" height="512" style="border:1px solid #ccc; margin:10px;"></canvas>
    
    <br>
    <button onclick="download192()">Download 192x192</button>
    <button onclick="download512()">Download 512x512</button>
    
    <script>
        // SVGを読み込んでCanvasに描画
        const svgContent = `
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#gradient)"/>
  <g transform="translate(256, 256)">
    <path d="M -80 -40 Q -70 -60 -50 -70 L -30 -80 Q -20 -85 -10 -80 L 0 -75 Q 10 -70 20 -60 L 40 -40 Q 50 -30 50 -10 L 50 20 Q 50 40 40 50 L 20 60 Q 0 65 -20 60 L -40 50 Q -50 40 -60 30 L -70 10 Q -80 -10 -80 -30 Z" 
          fill="white" opacity="0.9"/>
    <path d="M -60 80 L -40 60 L -20 70 L 0 40 L 20 50 L 40 20 L 60 30" 
          stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <circle cx="-60" cy="80" r="6" fill="white"/>
    <circle cx="-20" cy="70" r="6" fill="white"/>
    <circle cx="20" cy="50" r="6" fill="white"/>
    <circle cx="60" cy="30" r="6" fill="white"/>
  </g>
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">競馬AI</text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.8" text-anchor="middle">Pro</text>
</svg>`;
        
        const blob = new Blob([svgContent], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const img = new Image();
        
        img.onload = function() {
            // 192x192
            const canvas192 = document.getElementById('canvas192');
            const ctx192 = canvas192.getContext('2d');
            ctx192.drawImage(img, 0, 0, 192, 192);
            
            // 512x512
            const canvas512 = document.getElementById('canvas512');
            const ctx512 = canvas512.getContext('2d');
            ctx512.drawImage(img, 0, 0, 512, 512);
            
            URL.revokeObjectURL(url);
        };
        
        img.src = url;
        
        function download192() {
            const canvas = document.getElementById('canvas192');
            const link = document.createElement('a');
            link.download = 'icon-192x192.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        function download512() {
            const canvas = document.getElementById('canvas512');
            const link = document.createElement('a');
            link.download = 'icon-512x512.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
