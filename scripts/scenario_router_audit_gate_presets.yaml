presets:
  local:
    baseline_window: 5
    min_baseline_samples: 3
    duration_warn_multiplier: 3.0
    duration_fail_multiplier: 6.0
    min_last_10_success_rate: 0.7
    fail_on_flaky: false
    fail_on_duration_spike: false
    strict: false
    required_steps:
      - health_check
      - scenario_router_e2e
      - scenario_router_auto_recovery_e2e
      - py_compile
      - import_smoke

  ci:
    baseline_window: 10
    min_baseline_samples: 5
    duration_warn_multiplier: 2.5
    duration_fail_multiplier: 5.0
    min_last_10_success_rate: 0.8
    fail_on_flaky: false
    fail_on_duration_spike: false
    strict: false
    required_steps:
      - health_check
      - scenario_router_e2e
      - scenario_router_auto_recovery_e2e
      - py_compile
      - import_smoke

  nightly:
    baseline_window: 30
    min_baseline_samples: 10
    duration_warn_multiplier: 2.0
    duration_fail_multiplier: 4.0
    min_last_10_success_rate: 0.85
    fail_on_flaky: true
    fail_on_duration_spike: false
    strict: true
    required_steps:
      - health_check
      - scenario_router_e2e
      - scenario_router_auto_recovery_e2e
      - py_compile
      - import_smoke

  pr:
    baseline_window: 10
    min_baseline_samples: 5
    duration_warn_multiplier: 3.0
    duration_fail_multiplier: 6.0
    min_last_10_success_rate: 0.8
    fail_on_flaky: false
    fail_on_duration_spike: false
    strict: false
    required_steps:
      - health_check
      - scenario_router_e2e
      - scenario_router_auto_recovery_e2e
      - py_compile
      - import_smoke
